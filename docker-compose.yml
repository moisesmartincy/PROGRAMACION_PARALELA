version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"

  nlu:
    build: ./nlu

  response:
    build: ./response

  logger:
    build: ./logger

  gateway:
    build: ./gateway
    ports:
      - "5000:5000"
    depends_on:
      - nlu
      - response
      - logger
